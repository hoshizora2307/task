<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小野田の営業日報 ＆ 活動管理</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .ghost { opacity: 0.4; background: #e2e8f0; }
        .calendar-grid div { min-height: 65px; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen text-slate-800 font-sans flex flex-col">

    <header class="bg-blue-600 text-white p-4 shadow-md sticky top-0 z-10 flex flex-col sm:flex-row justify-between items-center gap-4 shrink-0">
        <h1 class="text-xl font-bold">📝 小野田の営業日報 ＆ 活動管理 (本番サーバー版)</h1>
        <button onclick="openAddModal()" class="bg-white text-blue-600 px-4 py-2 rounded-lg font-bold shadow hover:bg-blue-50 transition active:scale-95 w-full sm:w-auto">
            + 取引先を追加
        </button>
    </header>

    <div class="bg-white p-4 shadow-sm border-b flex flex-wrap items-center gap-2 shrink-0">
        <span class="text-xs font-bold text-slate-500 mr-2">案件で絞り込み:</span>
        <button onclick="filterCategory('ALL')" id="btn-filter-ALL" class="px-3 py-1.5 rounded-full text-xs font-bold bg-blue-600 text-white shadow">すべて表示</button>
        <button onclick="filterCategory('pudding')" id="btn-filter-pudding" class="px-3 py-1.5 rounded-full text-xs font-bold bg-slate-100 text-slate-600 hover:bg-slate-200">🍮 ウェルカムプリン</button>
        <button onclick="filterCategory('star')" id="btn-filter-star" class="px-3 py-1.5 rounded-full text-xs font-bold bg-slate-100 text-slate-600 hover:bg-slate-200">✨ 星空鑑賞会</button>
        <button onclick="filterCategory('other')" id="btn-filter-other" class="px-3 py-1.5 rounded-full text-xs font-bold bg-slate-100 text-slate-600 hover:bg-slate-200">📁 その他</button>
    </div>

    <div class="flex-1 flex flex-col lg:flex-row p-4 md:p-6 gap-6 items-start overflow-x-auto">
        <div class="flex gap-4 items-start flex-1 min-w-[1000px] lg:min-w-0">
            <div class="bg-slate-200 p-3 rounded-xl w-64 shrink-0 shadow-sm flex flex-col max-h-[75vh]">
                <h2 class="font-bold text-slate-700 mb-3 flex justify-between px-1 text-sm">📞 テレアポ <span class="bg-slate-300 text-slate-700 text-xs px-2 py-0.5 rounded-full card-count">0</span></h2>
                <div id="teleapo" class="kanban-list flex-1 overflow-y-auto min-h-[150px] space-y-2"></div>
            </div>
            <div class="bg-slate-200 p-3 rounded-xl w-64 shrink-0 shadow-sm flex flex-col max-h-[75vh]">
                <h2 class="font-bold text-slate-700 mb-3 flex justify-between px-1 text-sm">🤝 初回訪問 <span class="bg-slate-300 text-slate-700 text-xs px-2 py-0.5 rounded-full card-count">0</span></h2>
                <div id="visit" class="kanban-list flex-1 overflow-y-auto min-h-[150px] space-y-2"></div>
            </div>
            <div class="bg-slate-200 p-3 rounded-xl w-64 shrink-0 shadow-sm flex flex-col max-h-[75vh]">
                <h2 class="font-bold text-slate-700 mb-3 flex justify-between px-1 text-sm">📄 提案・見積 <span class="bg-slate-300 text-slate-700 text-xs px-2 py-0.5 rounded-full card-count">0</span></h2>
                <div id="proposal" class="kanban-list flex-1 overflow-y-auto min-h-[150px] space-y-2"></div>
            </div>
            <div class="bg-slate-200 p-3 rounded-xl w-64 shrink-0 shadow-sm flex flex-col max-h-[75vh]">
                <h2 class="font-bold text-slate-700 mb-3 flex justify-between px-1 text-sm">🎉 成約 <span class="bg-emerald-200 text-emerald-800 text-xs px-2 py-0.5 rounded-full card-count">0</span></h2>
                <div id="contract" class="kanban-list flex-1 overflow-y-auto min-h-[150px] space-y-2"></div>
            </div>
        </div>

        <div class="w-full lg:w-96 bg-white p-4 rounded-xl shadow-sm border border-slate-200 shrink-0">
            <h2 id="calendarMonthTitle" class="font-bold text-slate-800 text-lg mb-1">📅 営業活動スケジュール</h2>
            <div class="flex flex-wrap gap-x-3 gap-y-1 text-[10px] mb-3 text-slate-500">
                <span class="flex items-center gap-0.5"><span class="w-2 h-2 rounded-full bg-amber-400 inline-block"></span>テレアポ済/再コ</span>
                <span class="flex items-center gap-0.5"><span class="w-2 h-2 rounded-full bg-blue-500 inline-block"></span>訪問予定</span>
                <span class="flex items-center gap-0.5"><span class="w-2 h-2 rounded-full bg-emerald-500 inline-block"></span>成約日</span>
            </div>
            <div class="grid grid-cols-7 gap-1 text-center text-xs font-bold text-slate-500 mb-2 border-b pb-1">
                <div class="text-red-500">日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div class="text-blue-500">土</div>
            </div>
            <div id="calendarGrid" class="grid grid-cols-7 gap-1 calendar-grid text-xs"></div>
        </div>
    </div>

    <footer class="bg-slate-800 text-slate-400 text-center py-3 text-xs shrink-0">&copy; 2026 株式会社MONDOCOLO All Rights Reserved.</footer>

    <div id="modal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center hidden p-4">
        <div class="bg-white rounded-2xl w-full max-w-md p-6 shadow-xl max-h-[90vh] overflow-y-auto">
            <h3 id="modalTitle" class="text-xl font-bold border-b pb-3 mb-4 text-slate-800">取引先詳細</h3>
            <input type="hidden" id="currentCardId"><input type="hidden" id="currentStatus">
            <div class="space-y-4">
                <div><label class="block text-xs font-bold text-slate-500 mb-1">取引先名</label><input type="text" id="editName" class="w-full border rounded-lg p-2 bg-slate-50 focus:bg-white outline-none text-sm"></div>
                <div><label class="block text-xs font-bold text-slate-500 mb-1">案件カテゴリー</label><select id="editCategory" class="w-full border rounded-lg p-2 bg-slate-50 text-sm outline-none"><option value="pudding">🍮 ウェルカムプリン導入案件</option><option value="star">✨ 星空鑑賞会案件</option><option value="other">📁 その他</option></select></div>
                <div class="grid grid-cols-1 gap-2 border-t pt-2"><label class="block text-xs font-bold text-slate-700">🗓 各種活動日・予定の記録</label><div class="grid grid-cols-2 gap-2"><div><label class="block text-[11px] text-slate-500 mb-0.5">📞 テレアポした日</label><input type="date" id="editTeleapoDate" class="w-full border rounded-lg p-1.5 text-xs outline-none bg-slate-50"></div><div><label class="block text-[11px] text-blue-600 font-bold mb-0.5">📞 次回テレアポ日</label><input type="date" id="editNextTeleapoDate" class="w-full border border-blue-200 rounded-lg p-1.5 text-xs outline-none bg-blue-50/50"></div></div><div><label class="block text-[11px] text-slate-500 mb-0.5">📅 次に行く日（訪問予定日）</label><input type="date" id="editNextDate" class="w-full border rounded-lg p-1.5 text-sm outline-none bg-slate-50"></div><div><label class="block text-[11px] text-slate-500 mb-0.5">🎉 成約した日</label><input type="date" id="editContractDate" class="w-full border rounded-lg p-1.5 text-sm outline-none bg-slate-50"></div></div>
                <div><label class="block text-xs font-bold text-slate-500 mb-1">進捗・行動メモ</label><textarea id="editNotes" rows="3" class="w-full border rounded-lg p-2 bg-slate-50 text-sm outline-none"></textarea></div>
            </div>
            <div class="mt-6 flex justify-between gap-2 border-t pt-4">
                <button onclick="deleteCard()" class="px-4 py-2 bg-red-50 text-red-600 rounded-lg text-sm font-bold">削除</button>
                <div class="flex gap-2"><button onclick="closeModal()" class="px-4 py-2 bg-slate-100 text-slate-600 rounded-lg text-sm font-bold">閉じる</button><button onclick="saveCardDetails()" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-bold shadow">保存する</button></div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://fcyudtejvlsukcxtnzyw.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_oYjRKfWMxNIM8xUfZrnH7A_m5J0fS5J"; 
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let currentFilter = 'ALL';
        let appData = { cards: [] };

        const catConfig = {
            pudding: { label: 'プリン', bg: 'bg-amber-50', border: 'border-amber-200', badge: 'bg-amber-100 text-amber-900' },
            star: { label: '星空', bg: 'bg-purple-50', border: 'border-purple-200', badge: 'bg-purple-100 text-purple-900' },
            other: { label: 'その他', bg: 'bg-slate-50', border: 'border-slate-200', badge: 'bg-slate-200 text-slate-800' }
        };

        document.addEventListener('DOMContentLoaded', async () => {
            await fetchCardsFromServer();
            initDragAndDrop();
        });

        async function fetchCardsFromServer() {
            try {
                const { data, error } = await supabase.from('sales_cards').select('*').order('created_at', { ascending: true });
                if (!error && data) {
                    appData.cards = data.map(item => ({
                        id: item.id, name: item.name, status: item.status, category: item.category,
                        teleapoDate: item.teleapo_date, nextTeleapoDate: item.next_teleapo_date,
                        nextDate: item.next_date, contractDate: item.contract_date, notes: item.notes
                    }));
                }
                renderBoard();
            } catch(e) { console.error(e); }
        }

        function filterCategory(cat) {
            currentFilter = cat;
            ['ALL', 'pudding', 'star', 'other'].forEach(c => {
                document.getElementById(`btn-filter-${c}`).className = c === cat ? "px-3 py-1.5 rounded-full text-xs font-bold bg-blue-600 text-white shadow" : "px-3 py-1.5 rounded-full text-xs font-bold bg-slate-100 text-slate-600 hover:bg-slate-200";
            });
            renderBoard();
        }

        function renderBoard() {
            const lists = { teleapo: [], visit: [], proposal: [], contract: [] };
            appData.cards.forEach(card => {
                if (lists[card.status] && (currentFilter === 'ALL' || card.category === currentFilter)) {
                    lists[card.status].push(card);
                }
            });

            Object.keys(lists).forEach(status => {
                const listEl = document.getElementById(status);
                listEl.innerHTML = '';
                lists[status].forEach(card => {
                    const cfg = catConfig[card.category] || catConfig.other;
                    const cardEl = document.createElement('div');
                    cardEl.className = `${cfg.bg} ${cfg.border} border p-3 rounded-xl shadow-sm cursor-grab active:cursor-grabbing hover:shadow-md transition relative`;
                    cardEl.setAttribute('data-id', card.id);
                    cardEl.onclick = () => openEditModal(card.id);

                    let dateBadges = '';
                    if(card.nextTeleapoDate) dateBadges += `<div class="mt-1 text-[9px] font-bold text-amber-700 bg-amber-50 border border-amber-200 px-1 py-0.5 rounded inline-block mr-1">📞 再電: ${card.nextTeleapoDate}</div>`;
                    if(card.nextDate) dateBadges += `<div class="mt-1 text-[9px] font-bold text-blue-600 bg-white/90 border border-blue-200 px-1 py-0.5 rounded inline-block mr-1">📅 訪問: ${card.nextDate}</div>`;
                    if(card.contractDate) dateBadges += `<div class="mt-1 text-[9px] font-bold text-emerald-700 bg-emerald-50 border border-emerald-200 px-1 py-0.5 rounded inline-block">🎉 成約!</div>`;

                    cardEl.innerHTML = `<div class="flex justify-between items-start gap-1"><div class="font-bold text-slate-800 text-sm">${card.name}</div><span class="${cfg.badge} text-[10px] px-1.5 py-0.5 rounded-md font-bold shrink-0">${cfg.label}</span></div><p class="text-xs text-slate-500 mt-1 line-clamp-2">${card.notes || 'メモなし'}</p><div class="flex flex-wrap">${dateBadges}</div>`;
                    listEl.appendChild(cardEl);
                });
                listEl.parentElement.querySelector('.card-count').innerText = lists[status].length;
            });
            renderCalendar();
        }

        function initDragAndDrop() {
            ['teleapo', 'visit', 'proposal', 'contract'].forEach(id => {
                Sortable.create(document.getElementById(id), {
                    group: 'kanban', ghostClass: 'ghost', animation: 150,
                    onEnd: async (evt) => {
                        const cardId = evt.item.getAttribute('data-id');
                        const newStatus = evt.to.id;
                        const card = appData.cards.find(c => c.id === cardId);
                        if (card) {
                            card.status = newStatus;
                            let updateData = { status: newStatus };
                            if(newStatus === 'contract' && !card.contractDate) {
                                card.contractDate = new Date().toISOString().split('T')[0];
                                updateData.contract_date = card.contractDate;
                            }
                            await supabase.from('sales_cards').update(updateData).eq('id', cardId);
                            renderBoard();
                        }
                    }
                });
            });
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid'); grid.innerHTML = '';
            const now = new Date(); const year = now.getFullYear(); const month = now.getMonth();
            document.getElementById('calendarMonthTitle').innerText = `📅 活動スケジュール (${year}年${month + 1}月)`;
            const firstDay = new Date(year, month, 1).getDay(); const daysInMonth = new Date(year, month + 1, 0).getDate();

            for (let i = 0; i < firstDay; i++) grid.appendChild(document.createElement('div'));
            for (let day = 1; day <= daysInMonth; day++) {
                const dayStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const cell = document.createElement('div');
                cell.className = 'bg-slate-50 border border-slate-100 p-1 rounded flex flex-col justify-between overflow-hidden';
                const num = document.createElement('span'); num.className = 'font-bold text-slate-400 block text-[9px] mb-0.5'; num.innerText = day;
                cell.appendChild(num);

                const listContainer = document.createElement('div');
                listContainer.className = 'space-y-0.5 overflow-y-auto flex-1 max-h-[50px]';

                appData.cards.forEach(c => {
                    if (currentFilter !== 'ALL' && c.category !== currentFilter) return;
                    if(c.teleapoDate === dayStr) createBadge(listContainer, `📞 ${c.name}`, 'bg-amber-400 text-white', c.id);
                    if(c.nextTeleapoDate === dayStr) createBadge(listContainer, `📞 [再] ${c.name}`, 'bg-amber-500 text-white border border-amber-600', c.id);
                    if(c.nextDate === dayStr) createBadge(listContainer, `📅 ${c.name}`, 'bg-blue-500 text-white', c.id);
                    if(c.contractDate === dayStr) createBadge(listContainer, `🎉 ${c.name}`, 'bg-emerald-500 text-white', c.id);
                });
                cell.appendChild(listContainer); grid.appendChild(cell);
            }
        }

        function createBadge(container, text, bgClass, id) {
            const item = document.createElement('div');
            item.className = `${bgClass} text-[8px] px-1 rounded truncate font-bold cursor-pointer`;
            item.innerText = text;
            item.onclick = (e) => { e.stopPropagation(); openEditModal(id); };
            container.appendChild(item);
        }

        function openAddModal() {
            document.getElementById('currentCardId').value = 'NEW';
            document.getElementById('editName').value = ''; document.getElementById('editCategory').value = 'pudding';
            document.getElementById('editTeleapoDate').value = ''; document.getElementById('editNextTeleapoDate').value = '';
            document.getElementById('editNextDate').value = ''; document.getElementById('editContractDate').value = '';
            document.getElementById('editNotes').value = ''; document.getElementById('modal').classList.remove('hidden');
        }

        function openEditModal(id) {
            const card = appData.cards.find(c => c.id === id); if (!card) return;
            document.getElementById('currentCardId').value = card.id;
            document.getElementById('editName').value = card.name; document.getElementById('editCategory').value = card.category;
            document.getElementById('editTeleapoDate').value = card.teleapoDate || ''; document.getElementById('editNextTeleapoDate').value = card.nextTeleapoDate || '';
            document.getElementById('editNextDate').value = card.nextDate || ''; document.getElementById('editContractDate').value = card.contractDate || '';
            document.getElementById('editNotes').value = card.notes || ''; document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        async function saveCardDetails() {
            const id = document.getElementById('currentCardId').value;
            const name = document.getElementById('editName').value.trim();
            const category = document.getElementById('editCategory').value;
            const teleapoDate = document.getElementById('editTeleapoDate').value;
            const nextTeleapoDate = document.getElementById('editNextTeleapoDate').value;
            const nextDate = document.getElementById('editNextDate').value;
            const contractDate = document.getElementById('editContractDate').value;
            const notes = document.getElementById('editNotes').value;

            if (!name) { alert('取引先名を入力してください！'); return; }

            const serverData = {
                name: name, category: category, status: id === 'NEW' ? 'teleapo' : appData.cards.find(c => c.id === id).status,
                teleapo_date: teleapoDate, next_teleapo_date: nextTeleapoDate, next_date: nextDate, contract_date: contractDate, notes: notes
            };

            if (id === 'NEW') {
                const newId = Date.now().toString();
                serverData.id = newId;
                await supabase.from('sales_cards').insert([serverData]);
            } else {
                await supabase.from('sales_cards').update(serverData).eq('id', id);
            }

            closeModal();
            await fetchCardsFromServer();
        }

        async function deleteCard() {
            const id = document.getElementById('currentCardId').value;
            if (id === 'NEW') { closeModal(); return; }
            if (confirm('データを完全に削除します。よろしいですか？')) {
                await supabase.from('sales_cards').delete().eq('id', id);
                closeModal();
                await fetchCardsFromServer();
            }
        }
    </script>
</body>
</html>
