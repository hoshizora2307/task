<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小野田の営業日報 ＆ 活動管理</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --blue:#2563eb; --blue-dark:#1d4ed8; --blue-light:#eff6ff;
    --slate-50:#f8fafc; --slate-100:#f1f5f9; --slate-200:#e2e8f0; --slate-300:#cbd5e1;
    --slate-400:#94a3b8; --slate-500:#64748b; --slate-600:#475569; --slate-700:#334155; --slate-800:#1e293b;
    --amber-50:#fffbeb; --amber-100:#fef3c7; --amber-200:#fde68a; --amber-400:#fbbf24; --amber-500:#f59e0b; --amber-600:#d97706; --amber-700:#b45309; --amber-900:#78350f;
    --purple-50:#faf5ff; --purple-100:#f3e8ff; --purple-200:#e9d5ff; --purple-900:#581c87;
    --emerald-50:#ecfdf5; --emerald-100:#d1fae5; --emerald-200:#a7f3d0; --emerald-500:#10b981; --emerald-700:#047857; --emerald-800:#065f46;
    --red-50:#fef2f2; --red-500:#ef4444; --red-600:#dc2626;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--slate-100); color:var(--slate-800);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Hiragino Sans",Meiryo,sans-serif;
    min-height:100vh; display:flex; flex-direction:column;
  }
  header{
    background:var(--blue); color:#fff; padding:16px; box-shadow:0 1px 3px rgba(0,0,0,.15);
    position:sticky; top:0; z-index:20; display:flex; flex-direction:column; gap:12px;
    align-items:center; justify-content:space-between; flex-shrink:0;
  }
  @media(min-width:640px){ header{ flex-direction:row; } }
  header h1{ font-size:1.1rem; font-weight:700; margin:0; }
  .btn-add{
    background:#fff; color:var(--blue); padding:10px 16px; border-radius:10px; font-weight:700;
    box-shadow:0 1px 2px rgba(0,0,0,.1); border:none; cursor:pointer; width:100%; font-size:.9rem;
  }
  @media(min-width:640px){ .btn-add{ width:auto; } }
  .btn-add:hover{ background:var(--blue-light); }
  .btn-add:active{ transform:scale(.97); }

  .filterbar{
    background:#fff; padding:14px 16px; box-shadow:0 1px 2px rgba(0,0,0,.05); border-bottom:1px solid var(--slate-200);
    display:flex; flex-wrap:wrap; align-items:center; gap:8px; flex-shrink:0;
  }
  .filterbar .label{ font-size:.7rem; font-weight:700; color:var(--slate-500); margin-right:4px; }
  .chip{
    padding:6px 14px; border-radius:999px; font-size:.72rem; font-weight:700; border:none; cursor:pointer;
    background:var(--slate-100); color:var(--slate-600);
  }
  .chip:hover{ background:var(--slate-200); }
  .chip.active{ background:var(--blue); color:#fff; box-shadow:0 1px 3px rgba(0,0,0,.15); }

  .layout{
    flex:1; display:flex; flex-direction:column; gap:24px; padding:16px;
    align-items:flex-start; overflow-x:auto;
  }
  @media(min-width:1024px){ .layout{ flex-direction:row; padding:24px; } }

  .board{ display:flex; gap:16px; align-items:flex-start; flex:1; min-width:1000px; }
  @media(min-width:1024px){ .board{ min-width:0; } }

  .col{
    background:var(--slate-200); padding:12px; border-radius:14px; width:256px; flex-shrink:0;
    box-shadow:0 1px 2px rgba(0,0,0,.05); display:flex; flex-direction:column; max-height:75vh;
  }
  .col h2{
    font-weight:700; color:var(--slate-700); margin:0 0 12px; padding:0 4px;
    display:flex; justify-content:space-between; font-size:.85rem; align-items:center;
  }
  .count{
    background:var(--slate-300); color:var(--slate-700); font-size:.7rem; padding:2px 8px;
    border-radius:999px; font-weight:700;
  }
  .count.contract{ background:var(--emerald-200); color:var(--emerald-800); }
  .kanban-list{ flex:1; overflow-y:auto; min-height:150px; display:flex; flex-direction:column; gap:8px; }

  .card{
    border:1px solid; padding:12px; border-radius:12px; box-shadow:0 1px 2px rgba(0,0,0,.05);
    cursor:grab; position:relative; transition:box-shadow .15s;
  }
  .card:hover{ box-shadow:0 4px 8px rgba(0,0,0,.08); }
  .card:active{ cursor:grabbing; }
  .card.ghost{ opacity:.4; background:var(--slate-200); }
  .card-top{ display:flex; justify-content:space-between; align-items:flex-start; gap:6px; }
  .card-name{ font-weight:700; color:var(--slate-800); font-size:.875rem; word-break:break-word; }
  .card-badge{ font-size:.65rem; padding:2px 6px; border-radius:6px; font-weight:700; flex-shrink:0; white-space:nowrap; }
  .card-notes{
    font-size:.75rem; color:var(--slate-500); margin:4px 0 0; overflow:hidden;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
  }
  .date-tags{ display:flex; flex-wrap:wrap; gap:4px; margin-top:6px; }
  .date-tag{ font-size:.62rem; font-weight:700; padding:2px 5px; border-radius:5px; border:1px solid; }

  .cat-pudding{ background:var(--amber-50); border-color:var(--amber-200); }
  .cat-star{ background:var(--purple-50); border-color:var(--purple-200); }
  .cat-other{ background:var(--slate-50); border-color:var(--slate-200); }
  .badge-pudding{ background:var(--amber-100); color:var(--amber-900); }
  .badge-star{ background:var(--purple-100); color:var(--purple-900); }
  .badge-other{ background:var(--slate-200); color:var(--slate-800); }
  .tag-recall{ color:var(--amber-700); background:var(--amber-50); border-color:var(--amber-200); }
  .tag-visit{ color:var(--blue-dark); background:rgba(255,255,255,.9); border-color:#bfdbfe; }
  .tag-contract{ color:var(--emerald-700); background:var(--emerald-50); border-color:var(--emerald-200); }

  .calendar-panel{
    width:100%; background:#fff; padding:16px; border-radius:14px; box-shadow:0 1px 2px rgba(0,0,0,.05);
    border:1px solid var(--slate-200); flex-shrink:0;
  }
  @media(min-width:1024px){ .calendar-panel{ width:384px; } }
  .calendar-panel h2{ font-weight:700; color:var(--slate-800); font-size:1.05rem; margin:0 0 4px; }
  .legend{ display:flex; flex-wrap:wrap; gap:10px 12px; font-size:.65rem; margin-bottom:12px; color:var(--slate-500); }
  .legend span{ display:flex; align-items:center; gap:4px; }
  .dot{ width:8px; height:8px; border-radius:50%; display:inline-block; }
  .dot-amber{ background:var(--amber-400); } .dot-blue{ background:var(--blue); } .dot-emerald{ background:var(--emerald-500); }
  .cal-head{
    display:grid; grid-template-columns:repeat(7,1fr); gap:4px; text-align:center; font-size:.72rem;
    font-weight:700; color:var(--slate-500); margin-bottom:8px; border-bottom:1px solid var(--slate-200); padding-bottom:4px;
  }
  .cal-head .sun{ color:var(--red-500); } .cal-head .sat{ color:var(--blue); }
  .cal-grid{ display:grid; grid-template-columns:repeat(7,1fr); gap:4px; font-size:.7rem; }
  .cal-cell{
    background:var(--slate-50); border:1px solid var(--slate-100); padding:4px; border-radius:6px;
    display:flex; flex-direction:column; justify-content:space-between; overflow:hidden; min-height:65px;
  }
  .cal-num{ font-weight:700; color:var(--slate-400); font-size:.62rem; display:block; margin-bottom:2px; }
  .cal-events{ display:flex; flex-direction:column; gap:2px; overflow-y:auto; flex:1; max-height:50px; }
  .cal-badge{ font-size:.58rem; padding:1px 3px; border-radius:4px; font-weight:700; cursor:pointer; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .bg-amber400{ background:var(--amber-400); } .bg-amber500{ background:var(--amber-500); border:1px solid var(--amber-600); }
  .bg-blue500{ background:var(--blue); } .bg-emerald500{ background:var(--emerald-500); }

  footer{ background:var(--slate-800); color:var(--slate-400); text-align:center; padding:12px; font-size:.72rem; flex-shrink:0; }

  .modal-overlay{
    position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:50; display:flex; align-items:center;
    justify-content:center; padding:16px;
  }
  .modal-overlay.hidden{ display:none; }
  .modal-box{
    background:#fff; border-radius:18px; width:100%; max-width:420px; padding:24px; box-shadow:0 10px 30px rgba(0,0,0,.25);
    max-height:90vh; overflow-y:auto;
  }
  .modal-box h3{ font-size:1.2rem; font-weight:700; border-bottom:1px solid var(--slate-200); padding-bottom:12px; margin:0 0 16px; color:var(--slate-800); }
  .field{ margin-bottom:14px; }
  .field label{ display:block; font-size:.72rem; font-weight:700; color:var(--slate-500); margin-bottom:4px; }
  .field input[type=text], .field input[type=date], .field select, .field textarea{
    width:100%; border:1px solid var(--slate-300); border-radius:10px; padding:8px 10px; background:var(--slate-50);
    font-size:.875rem; outline:none; font-family:inherit;
  }
  .field input:focus, .field select:focus, .field textarea:focus{ background:#fff; border-color:var(--blue); }
  .row2{ display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .sub-field label{ font-size:.66rem; color:var(--slate-500); margin-bottom:2px; }
  .sub-field.next label{ color:var(--blue-dark); font-weight:700; }
  .sub-field.next input{ background:rgba(239,246,255,.5); border-color:#bfdbfe; }
  .section-title{ font-size:.72rem; font-weight:700; color:var(--slate-700); margin:14px 0 8px; border-top:1px solid var(--slate-200); padding-top:10px; }
  .modal-footer{ display:flex; justify-content:space-between; gap:8px; border-top:1px solid var(--slate-200); padding-top:16px; margin-top:8px; }
  .modal-footer-right{ display:flex; gap:8px; }
  .btn{ padding:9px 16px; border-radius:10px; font-size:.85rem; font-weight:700; border:none; cursor:pointer; }
  .btn-delete{ background:var(--red-50); color:var(--red-600); }
  .btn-delete:hover{ background:#fee2e2; }
  .btn-cancel{ background:var(--slate-100); color:var(--slate-600); }
  .btn-cancel:hover{ background:var(--slate-200); }
  .btn-save{ background:var(--blue); color:#fff; box-shadow:0 1px 3px rgba(0,0,0,.2); }
  .btn-save:hover{ background:var(--blue-dark); }
  .btn-save:disabled{ opacity:.6; cursor:not-allowed; }

  .toast{
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--slate-800); color:#fff;
    padding:10px 18px; border-radius:10px; font-size:.8rem; z-index:100; box-shadow:0 4px 12px rgba(0,0,0,.3);
    opacity:0; transition:opacity .25s; pointer-events:none;
  }
  .toast.show{ opacity:1; }
  .toast.error{ background:var(--red-600); }

  .empty-hint{ font-size:.7rem; color:var(--slate-400); text-align:center; padding:16px 4px; }
</style>
</head>
<body>

<header>
  <h1>📝 小野田の営業日報 ＆ 活動管理</h1>
  <button class="btn-add" id="btnAdd" type="button">+ 取引先を追加</button>
</header>

<div class="filterbar">
  <span class="label">案件で絞り込み:</span>
  <button class="chip active" data-filter="ALL" type="button">すべて表示</button>
  <button class="chip" data-filter="pudding" type="button">🍮 ウェルカムプリン</button>
  <button class="chip" data-filter="star" type="button">✨ 星空鑑賞会</button>
  <button class="chip" data-filter="other" type="button">📁 その他</button>
</div>

<div class="layout">
  <div class="board">
    <div class="col">
      <h2>📞 テレアポ <span class="count" id="count-teleapo">0</span></h2>
      <div class="kanban-list" id="teleapo"></div>
    </div>
    <div class="col">
      <h2>🤝 初回訪問 <span class="count" id="count-visit">0</span></h2>
      <div class="kanban-list" id="visit"></div>
    </div>
    <div class="col">
      <h2>📄 提案・見積 <span class="count" id="count-proposal">0</span></h2>
      <div class="kanban-list" id="proposal"></div>
    </div>
    <div class="col">
      <h2>🎉 成約 <span class="count contract" id="count-contract">0</span></h2>
      <div class="kanban-list" id="contract"></div>
    </div>
  </div>

  <div class="calendar-panel">
    <h2 id="calendarMonthTitle">📅 営業活動スケジュール</h2>
    <div class="legend">
      <span><span class="dot dot-amber"></span>テレアポ済/再コ</span>
      <span><span class="dot dot-blue"></span>訪問予定</span>
      <span><span class="dot dot-emerald"></span>成約日</span>
    </div>
    <div class="cal-head">
      <div class="sun">日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div class="sat">土</div>
    </div>
    <div class="cal-grid" id="calendarGrid"></div>
  </div>
</div>

<footer>&copy; 2026 株式会社MONDOCOLO All Rights Reserved.</footer>

<div class="modal-overlay hidden" id="modal">
  <div class="modal-box">
    <h3 id="modalTitle">取引先詳細</h3>
    <input type="hidden" id="currentCardId">
    <input type="hidden" id="currentStatus">

    <div class="field">
      <label>取引先名</label>
      <input type="text" id="editName" placeholder="例：道の駅○○">
    </div>
    <div class="field">
      <label>案件カテゴリー</label>
      <select id="editCategory">
        <option value="pudding">🍮 ウェルカムプリン導入案件</option>
        <option value="star">✨ 星空鑑賞会案件</option>
        <option value="other">📁 その他</option>
      </select>
    </div>

    <div class="section-title">🗓 各種活動日・予定の記録</div>
    <div class="row2">
      <div class="sub-field">
        <label>📞 テレアポした日</label>
        <input type="date" id="editTeleapoDate">
      </div>
      <div class="sub-field next">
        <label>📞 次回テレアポ日</label>
        <input type="date" id="editNextTeleapoDate">
      </div>
    </div>
    <div class="field" style="margin-top:8px;">
      <label>📅 次に行く日（訪問予定日）</label>
      <input type="date" id="editNextDate">
    </div>
    <div class="field">
      <label>🎉 成約した日</label>
      <input type="date" id="editContractDate">
    </div>
    <div class="field">
      <label>進捗・行動メモ</label>
      <textarea id="editNotes" rows="3"></textarea>
    </div>

    <div class="modal-footer">
      <button class="btn btn-delete" id="btnDelete" type="button">削除</button>
      <div class="modal-footer-right">
        <button class="btn btn-cancel" id="btnCancel" type="button">閉じる</button>
        <button class="btn btn-save" id="btnSave" type="button">保存する</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";

  const SUPABASE_URL = "https://fcyudtejvlsukcxtnzyw.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_oYjRKfWMxNIM8xUfZrnH7A_m5J0fS5J";

  let supabase = null;
  let supabaseReady = false;

  // appData は常に最初に初期化する。Supabase が使えなくても画面は必ず動く。
  let appData = { cards: [] };
  let currentFilter = 'ALL';

  const catConfig = {
    pudding: { label: 'プリン', cardClass: 'cat-pudding', badgeClass: 'badge-pudding' },
    star:    { label: '星空',   cardClass: 'cat-star',    badgeClass: 'badge-star' },
    other:   { label: 'その他', cardClass: 'cat-other',   badgeClass: 'badge-other' }
  };

  function showToast(msg, isError){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (isError ? ' error' : '');
    clearTimeout(t._timer);
    t._timer = setTimeout(()=>{ t.className = 'toast' + (isError?' error':''); }, 2600);
  }

  function tryInitSupabase(){
    try {
      if (typeof window.supabase === 'undefined' || !window.supabase.createClient) {
        console.warn('Supabase SDK が読み込めませんでした。ローカル保存モードで動作します。');
        return false;
      }
      supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      return true;
    } catch(e){
      console.error('Supabase init error', e);
      return false;
    }
  }

  // ---- ローカル保存（Supabase 不通時のフォールバック） ----
  const LOCAL_KEY = 'onoda_sales_cards_fallback';
  function loadLocal(){
    try {
      const raw = localStorage.getItem(LOCAL_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch(e){ return []; }
  }
  function saveLocal(cards){
    try { localStorage.setItem(LOCAL_KEY, JSON.stringify(cards)); } catch(e){}
  }

  async function fetchCardsFromServer(){
    if (supabaseReady){
      try {
        const { data, error } = await supabase.from('sales_cards').select('*').order('created_at', { ascending: true });
        if (error) throw error;
        appData.cards = (data || []).map(item => ({
          id: item.id, name: item.name, status: item.status, category: item.category,
          teleapoDate: item.teleapo_date, nextTeleapoDate: item.next_teleapo_date,
          nextDate: item.next_date, contractDate: item.contract_date, notes: item.notes
        }));
      } catch(e){
        console.error('Supabase 取得エラー。ローカルデータで表示します。', e);
        showToast('サーバーに接続できません。ローカルの保存データを表示しています。', true);
        appData.cards = loadLocal();
      }
    } else {
      appData.cards = loadLocal();
    }
    renderBoard();
  }

  async function persistInsert(serverData){
    if (supabaseReady){
      const { error } = await supabase.from('sales_cards').insert([serverData]);
      if (error) { console.error(error); showToast('サーバーへの保存に失敗しました（ローカルに保存します）', true); return false; }
      return true;
    }
    return false;
  }
  async function persistUpdate(id, serverData){
    if (supabaseReady){
      const { error } = await supabase.from('sales_cards').update(serverData).eq('id', id);
      if (error) { console.error(error); showToast('サーバーへの保存に失敗しました（ローカルに保存します）', true); return false; }
      return true;
    }
    return false;
  }
  async function persistDelete(id){
    if (supabaseReady){
      const { error } = await supabase.from('sales_cards').delete().eq('id', id);
      if (error) { console.error(error); showToast('サーバーでの削除に失敗しました', true); return false; }
      return true;
    }
    return false;
  }

  // ---- フィルター ----
  function setupFilters(){
    document.querySelectorAll('.chip').forEach(btn => {
      btn.addEventListener('click', () => {
        currentFilter = btn.getAttribute('data-filter');
        document.querySelectorAll('.chip').forEach(b => b.classList.toggle('active', b === btn));
        renderBoard();
      });
    });
  }

  // ---- 描画 ----
  function renderBoard(){
    const lists = { teleapo: [], visit: [], proposal: [], contract: [] };
    appData.cards.forEach(card => {
      if (lists[card.status] && (currentFilter === 'ALL' || card.category === currentFilter)) {
        lists[card.status].push(card);
      }
    });

    Object.keys(lists).forEach(status => {
      const listEl = document.getElementById(status);
      listEl.innerHTML = '';
      if (lists[status].length === 0){
        const hint = document.createElement('div');
        hint.className = 'empty-hint';
        hint.textContent = 'カードはありません';
        listEl.appendChild(hint);
      }
      lists[status].forEach(card => {
        const cfg = catConfig[card.category] || catConfig.other;
        const cardEl = document.createElement('div');
        cardEl.className = 'card ' + cfg.cardClass;
        cardEl.setAttribute('data-id', card.id);
        cardEl.addEventListener('click', () => openEditModal(card.id));

        let dateBadges = '';
        if (card.nextTeleapoDate) dateBadges += `<span class="date-tag tag-recall">📞 再電: ${escapeHtml(card.nextTeleapoDate)}</span>`;
        if (card.nextDate) dateBadges += `<span class="date-tag tag-visit">📅 訪問: ${escapeHtml(card.nextDate)}</span>`;
        if (card.contractDate) dateBadges += `<span class="date-tag tag-contract">🎉 成約!</span>`;

        cardEl.innerHTML =
          `<div class="card-top">
             <div class="card-name">${escapeHtml(card.name)}</div>
             <span class="card-badge ${cfg.badgeClass}">${cfg.label}</span>
           </div>
           <p class="card-notes">${escapeHtml(card.notes || 'メモなし')}</p>
           <div class="date-tags">${dateBadges}</div>`;
        listEl.appendChild(cardEl);
      });
      document.getElementById('count-' + status).textContent = lists[status].length;
    });

    renderCalendar();
  }

  function escapeHtml(str){
    if (str === null || str === undefined) return '';
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  function initDragAndDrop(){
    if (typeof Sortable === 'undefined') {
      console.warn('Sortable.js が読み込めませんでした。ドラッグ＆ドロップは無効です。');
      return;
    }
    ['teleapo', 'visit', 'proposal', 'contract'].forEach(id => {
      Sortable.create(document.getElementById(id), {
        group: 'kanban', ghostClass: 'ghost', animation: 150,
        onEnd: async (evt) => {
          const cardId = evt.item.getAttribute('data-id');
          if (!cardId) { renderBoard(); return; }
          const newStatus = evt.to.id;
          const card = appData.cards.find(c => String(c.id) === String(cardId));
          if (card) {
            card.status = newStatus;
            let updateData = { status: newStatus };
            if (newStatus === 'contract' && !card.contractDate) {
              card.contractDate = new Date().toISOString().split('T')[0];
              updateData.contract_date = card.contractDate;
            }
            const ok = await persistUpdate(card.id, updateData);
            if (!ok) saveLocal(appData.cards);
            renderBoard();
          }
        }
      });
    });
  }

  function renderCalendar(){
    const grid = document.getElementById('calendarGrid');
    grid.innerHTML = '';
    const now = new Date();
    const year = now.getFullYear();
    const month = now.getMonth();
    document.getElementById('calendarMonthTitle').textContent = `📅 活動スケジュール (${year}年${month + 1}月)`;
    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();

    for (let i = 0; i < firstDay; i++) {
      const blank = document.createElement('div');
      grid.appendChild(blank);
    }

    for (let day = 1; day <= daysInMonth; day++) {
      const dayStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
      const cell = document.createElement('div');
      cell.className = 'cal-cell';
      const num = document.createElement('span');
      num.className = 'cal-num';
      num.textContent = day;
      cell.appendChild(num);

      const eventsBox = document.createElement('div');
      eventsBox.className = 'cal-events';

      appData.cards.forEach(c => {
        if (currentFilter !== 'ALL' && c.category !== currentFilter) return;
        if (c.teleapoDate === dayStr) createBadge(eventsBox, `📞 ${c.name}`, 'bg-amber400', c.id);
        if (c.nextTeleapoDate === dayStr) createBadge(eventsBox, `📞[再]${c.name}`, 'bg-amber500', c.id);
        if (c.nextDate === dayStr) createBadge(eventsBox, `📅 ${c.name}`, 'bg-blue500', c.id);
        if (c.contractDate === dayStr) createBadge(eventsBox, `🎉 ${c.name}`, 'bg-emerald500', c.id);
      });

      cell.appendChild(eventsBox);
      grid.appendChild(cell);
    }
  }

  function createBadge(container, text, bgClass, id){
    const item = document.createElement('div');
    item.className = 'cal-badge ' + bgClass;
    item.textContent = text;
    item.title = text;
    item.addEventListener('click', (e) => { e.stopPropagation(); openEditModal(id); });
    container.appendChild(item);
  }

  // ---- モーダル ----
  function openModal(){
    document.getElementById('modal').classList.remove('hidden');
  }
  function closeModal(){
    document.getElementById('modal').classList.add('hidden');
  }

  function openAddModal(){
    document.getElementById('modalTitle').textContent = '取引先を新規追加';
    document.getElementById('currentCardId').value = 'NEW';
    document.getElementById('editName').value = '';
    document.getElementById('editCategory').value = 'pudding';
    document.getElementById('editTeleapoDate').value = '';
    document.getElementById('editNextTeleapoDate').value = '';
    document.getElementById('editNextDate').value = '';
    document.getElementById('editContractDate').value = '';
    document.getElementById('editNotes').value = '';
    document.getElementById('btnDelete').style.display = 'none';
    openModal();
  }

  function openEditModal(id){
    const card = appData.cards.find(c => String(c.id) === String(id));
    if (!card) return;
    document.getElementById('modalTitle').textContent = '取引先詳細';
    document.getElementById('currentCardId').value = card.id;
    document.getElementById('editName').value = card.name || '';
    document.getElementById('editCategory').value = card.category || 'other';
    document.getElementById('editTeleapoDate').value = card.teleapoDate || '';
    document.getElementById('editNextTeleapoDate').value = card.nextTeleapoDate || '';
    document.getElementById('editNextDate').value = card.nextDate || '';
    document.getElementById('editContractDate').value = card.contractDate || '';
    document.getElementById('editNotes').value = card.notes || '';
    document.getElementById('btnDelete').style.display = '';
    openModal();
  }

  async function saveCardDetails(){
    const saveBtn = document.getElementById('btnSave');
    const id = document.getElementById('currentCardId').value;
    const name = document.getElementById('editName').value.trim();
    const category = document.getElementById('editCategory').value;
    const teleapoDate = document.getElementById('editTeleapoDate').value;
    const nextTeleapoDate = document.getElementById('editNextTeleapoDate').value;
    const nextDate = document.getElementById('editNextDate').value;
    const contractDate = document.getElementById('editContractDate').value;
    const notes = document.getElementById('editNotes').value;

    if (!name) { showToast('取引先名を入力してください！', true); return; }

    saveBtn.disabled = true;
    saveBtn.textContent = '保存中…';

    try {
      if (id === 'NEW') {
        const newId = Date.now().toString();
        const newCard = {
          id: newId, name, category, status: 'teleapo',
          teleapoDate: teleapoDate || null, nextTeleapoDate: nextTeleapoDate || null,
          nextDate: nextDate || null, contractDate: contractDate || null, notes
        };
        const serverData = {
          id: newId, name, category, status: 'teleapo',
          teleapo_date: teleapoDate || null, next_teleapo_date: nextTeleapoDate || null,
          next_date: nextDate || null, contract_date: contractDate || null, notes
        };
        const ok = await persistInsert(serverData);
        if (!ok) {
          appData.cards.push(newCard);
          saveLocal(appData.cards);
        }
      } else {
        const existing = appData.cards.find(c => String(c.id) === String(id));
        const status = existing ? existing.status : 'teleapo';
        const serverData = {
          name, category, status,
          teleapo_date: teleapoDate || null, next_teleapo_date: nextTeleapoDate || null,
          next_date: nextDate || null, contract_date: contractDate || null, notes
        };
        const ok = await persistUpdate(id, serverData);
        if (!ok && existing) {
          Object.assign(existing, { name, category, teleapoDate, nextTeleapoDate, nextDate, contractDate, notes });
          saveLocal(appData.cards);
        }
      }

      closeModal();
      await fetchCardsFromServer();
      showToast('保存しました');
    } catch(e) {
      console.error(e);
      showToast('保存中にエラーが発生しました', true);
    } finally {
      saveBtn.disabled = false;
      saveBtn.textContent = '保存する';
    }
  }

  async function deleteCard(){
    const id = document.getElementById('currentCardId').value;
    if (id === 'NEW') { closeModal(); return; }
    if (!confirm('データを完全に削除します。よろしいですか？')) return;

    const ok = await persistDelete(id);
    if (!ok) {
      appData.cards = appData.cards.filter(c => String(c.id) !== String(id));
      saveLocal(appData.cards);
    }
    closeModal();
    await fetchCardsFromServer();
    showToast('削除しました');
  }

  // ---- 起動 ----
  function bindUI(){
    document.getElementById('btnAdd').addEventListener('click', openAddModal);
    document.getElementById('btnCancel').addEventListener('click', closeModal);
    document.getElementById('btnSave').addEventListener('click', saveCardDetails);
    document.getElementById('btnDelete').addEventListener('click', deleteCard);
    document.getElementById('modal').addEventListener('click', (e) => {
      if (e.target.id === 'modal') closeModal();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
    });
    setupFilters();
  }

  document.addEventListener('DOMContentLoaded', async () => {
    bindUI();
    supabaseReady = tryInitSupabase();
    await fetchCardsFromServer();
    initDragAndDrop();
  });
})();
</script>
</body>
</html>
